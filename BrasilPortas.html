<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Termo de Medição — Portas</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --brown:#5c3d1e;--brown2:#7a5230;--brown3:#9c6b3c;
  --warm:#f5efe6;--warm2:#ede2d4;--warm3:#ddd0be;
  --gold:#c8902a;--gold2:#e0a83a;
  --text:#2c1f0e;--muted:#8a7260;--border:#d4c4b0;
  --white:#fff;--bg:#f2ece3;
  --red:#c0392b;--green:#27ae60;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:var(--bg);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* ── HEADER ── */
#hdr{
  background:linear-gradient(135deg,var(--brown) 0%,var(--brown2) 60%,var(--brown3) 100%);
  padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  box-shadow:0 3px 16px rgba(92,61,30,.35);
}
.hdr-logo{display:flex;align-items:center;gap:14px;}
.hdr-icon{width:38px;height:38px;background:rgba(255,255,255,.12);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;}
.hdr-brand{display:flex;flex-direction:column;}
.hdr-title{color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;letter-spacing:2px;line-height:1;}
.hdr-sub{color:rgba(255,255,255,.55);font-size:10px;letter-spacing:1px;text-transform:uppercase;margin-top:2px;}
.hdr-right{display:flex;gap:6px;align-items:center;}
.tab-btn{border:none;border-radius:8px;padding:7px 16px;cursor:pointer;font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:.5px;transition:all .15s;}
.tab-btn.on{background:#fff;color:var(--brown);}
.tab-btn.off{background:rgba(255,255,255,.12);color:#fff;}
.tab-btn.off:hover{background:rgba(255,255,255,.22);}
.print-btn{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#c0392b,#96281b);color:#fff;border:none;border-radius:8px;padding:7px 16px;cursor:pointer;font-family:'Oswald',sans-serif;font-weight:600;font-size:13px;letter-spacing:.5px;box-shadow:0 2px 8px rgba(192,57,43,.35);transition:all .15s;}
.print-btn:hover{transform:translateY(-1px);}

/* ── LAYOUT ── */
#layout{display:flex;flex:1;overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{width:235px;flex-shrink:0;background:var(--white);border-right:1.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.sb-head{padding:14px 12px 10px;border-bottom:1px solid var(--border);}
.sb-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;}
.new-btn{width:100%;border:1.5px solid var(--brown3);border-radius:9px;background:transparent;color:var(--brown);padding:8px 12px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:6px;transition:all .15s;}
.new-btn:hover{background:var(--warm);border-color:var(--brown);}
.sb-list{flex:1;overflow-y:auto;padding:8px 6px;}
.sb-list::-webkit-scrollbar{width:4px;}
.sb-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.proj-item{border-radius:10px;padding:9px 10px;cursor:pointer;margin-bottom:3px;transition:background .15s;position:relative;}
.proj-item:hover{background:var(--warm);}
.proj-item.active{background:var(--warm2);border-left:3px solid var(--brown);padding-left:7px;}
.proj-name{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Oswald',sans-serif;}
.proj-sub{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.proj-del{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--border);font-size:15px;opacity:0;transition:opacity .15s;line-height:1;padding:2px;}
.proj-item:hover .proj-del{opacity:1;}
.proj-del:hover{color:var(--red);}
.sb-empty{padding:20px 10px;text-align:center;color:var(--muted);font-size:12px;line-height:1.6;}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#info-bar{background:var(--white);border-bottom:1.5px solid var(--border);padding:10px 20px;display:flex;gap:14px;align-items:center;flex-shrink:0;flex-wrap:wrap;}
.lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.6px;text-transform:uppercase;white-space:nowrap;}
.fi{border:1.5px solid var(--border);border-radius:8px;padding:7px 11px;font-size:14px;font-weight:600;color:var(--text);background:var(--warm);font-family:'Source Sans 3',sans-serif;outline:none;transition:border-color .15s;}
.fi:focus{border-color:var(--brown);background:#fff;}
.idiv{width:1px;height:30px;background:var(--border);flex-shrink:0;}
.stat-lbl{font-size:10px;color:var(--muted);font-weight:700;text-align:right;text-transform:uppercase;letter-spacing:.4px;}
.stat-val{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;color:var(--brown);text-align:right;line-height:1;}
.auto-badge{font-size:10px;color:var(--brown);background:var(--warm2);padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;transition:all .3s;}

#content{flex:1;overflow-y:auto;padding:20px;}
#content::-webkit-scrollbar{width:6px;}
#content::-webkit-scrollbar-track{background:var(--bg);}
#content::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ── EDIT GRID ── */
.edit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}
.gc{background:var(--white);border-radius:14px;box-shadow:0 2px 12px rgba(92,61,30,.09);border:1.5px solid var(--border);padding:16px 14px 14px;display:flex;flex-direction:column;gap:10px;transition:box-shadow .2s;}
.gc:hover{box-shadow:0 4px 20px rgba(92,61,30,.14);}
.gc.has-sketch{border-color:var(--gold);box-shadow:0 2px 12px rgba(200,144,42,.2);}
.gc-top{display:flex;align-items:center;justify-content:space-between;}
.door-badge{background:linear-gradient(135deg,var(--brown),var(--brown2));color:#fff;border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;flex-shrink:0;}
.gc-type-tag{font-family:'Oswald',sans-serif;font-size:11px;font-weight:600;color:var(--brown2);background:var(--warm2);border-radius:6px;padding:3px 8px;letter-spacing:.5px;flex:1;text-align:center;margin:0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gc-rm{background:none;border:none;cursor:pointer;color:var(--border);font-size:17px;transition:color .15s;padding:2px 4px;line-height:1;}
.gc-rm:hover{color:var(--red);}

/* door SVG preview */
.gc-preview{display:flex;justify-content:center;align-items:center;min-height:90px;background:var(--warm);border-radius:8px;}

/* dims */
.gc-dims-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.gc-lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:3px;}
.gc-inp{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:6px 9px;font-size:13px;font-family:'Source Sans 3',sans-serif;color:var(--text);background:var(--warm);outline:none;transition:border-color .15s;}
.gc-inp:focus{border-color:var(--brown);background:#fff;}
.gc-inp optgroup{font-weight:700;color:var(--muted);font-style:normal;font-size:11px;}
.gc-inp option{font-size:12px;color:var(--text);}

.gc-tag{border-radius:6px;padding:4px 9px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:4px;}
.gc-type-badge{background:#fff3e0;border:1px solid #ffcc80;color:#e65100;}
.gc-nota-badge{background:#e8f4fd;border:1px solid #90caf9;color:#1565c0;}

.sketch-btn{width:100%;border:1.5px dashed var(--gold);border-radius:8px;background:rgba(200,144,42,.04);color:var(--gold);padding:6px 10px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:12px;font-weight:600;letter-spacing:.5px;display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;}
.sketch-btn:hover{background:rgba(200,144,42,.1);border-color:var(--brown3);}
.sketch-btn.has{background:rgba(200,144,42,.08);border-style:solid;}
.sketch-thumb{width:100%;border-radius:6px;border:1px solid var(--border);display:block;background:var(--warm);}
.rm-sketch-btn{width:100%;border:1.5px solid #ffccbc;border-radius:8px;background:#fff5f5;color:var(--red);padding:5px 8px;cursor:pointer;font-size:11px;font-family:'Source Sans 3',sans-serif;transition:all .15s;}
.rm-sketch-btn:hover{background:#ffebee;}

.add-card{border:2px dashed var(--border);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;cursor:pointer;min-height:240px;color:var(--muted);transition:all .15s;background:rgba(92,61,30,.02);font-family:'Oswald',sans-serif;font-weight:600;font-size:14px;letter-spacing:.5px;}
.add-card:hover{background:rgba(92,61,30,.06);border-color:var(--brown);color:var(--brown);}

/* ── PREVIEW ── */
.prev-wrap{background:var(--white);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;}
.prev-hdr{background:linear-gradient(135deg,var(--brown) 0%,var(--brown2) 60%,var(--brown3) 100%);padding:20px 28px;display:flex;align-items:center;justify-content:space-between;}
.prev-grid{padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
.pc{background:var(--white);border-radius:12px;border:1.5px solid var(--border);box-shadow:0 2px 10px rgba(92,61,30,.07);padding:13px 9px 11px;display:flex;flex-direction:column;align-items:center;gap:5px;}
.prev-ftr{background:var(--warm);border-top:1.5px solid var(--border);padding:13px 24px;display:flex;align-items:center;justify-content:space-between;}

/* ── EMPTY ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:12px;color:var(--muted);}

/* ── MODAL PROJETO ── */
.modal-overlay{position:fixed;inset:0;background:rgba(44,31,14,.4);display:flex;align-items:center;justify-content:center;z-index:1000;}
.modal{background:#fff;border-radius:16px;border:1.5px solid var(--border);padding:28px 26px;width:360px;box-shadow:0 20px 60px rgba(44,31,14,.25);}
.modal-title{font-family:'Oswald',sans-serif;font-weight:700;font-size:20px;color:var(--text);margin-bottom:20px;letter-spacing:.5px;}
.m-lbl{font-size:10px;color:var(--muted);font-weight:700;letter-spacing:.5px;text-transform:uppercase;display:block;margin-bottom:4px;}
.m-inp{width:100%;border:1.5px solid var(--border);border-radius:9px;padding:9px 12px;font-size:14px;font-family:'Source Sans 3',sans-serif;color:var(--text);background:var(--warm);outline:none;margin-bottom:14px;transition:border-color .15s;}
.m-inp:focus{border-color:var(--brown);background:#fff;}
.modal-btns{display:flex;gap:10px;justify-content:flex-end;margin-top:6px;}
.mbtn{border:1.5px solid var(--border);border-radius:9px;padding:8px 18px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:14px;font-weight:600;background:transparent;color:var(--muted);transition:all .15s;}
.mbtn:hover{background:var(--warm);border-color:var(--brown);color:var(--brown);}
.mbtn.primary{background:linear-gradient(135deg,var(--brown),var(--brown2));color:#fff;border-color:var(--brown);}
.mbtn.primary:hover{opacity:.9;transform:translateY(-1px);}

/* ── SKETCH MODAL ── */
#sketchModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:2000;align-items:center;justify-content:center;padding:16px;}
#sketchModal.open{display:flex;}
.sketch-box{background:#fff;border-radius:18px;box-shadow:0 24px 80px rgba(0,0,0,.35);display:flex;flex-direction:column;width:min(700px,100%);max-height:95vh;overflow:hidden;}
.sketch-toolbar{padding:10px 14px;background:#1a1208;display:flex;align-items:center;gap:7px;flex-wrap:wrap;}
.sk-title{color:#fff;font-family:'Oswald',sans-serif;font-weight:700;font-size:15px;letter-spacing:1px;flex:1;}
.sk-btn{background:rgba(255,255,255,.1);border:none;color:#e8ddd0;border-radius:7px;padding:5px 11px;cursor:pointer;font-family:'Oswald',sans-serif;font-weight:600;font-size:12px;display:flex;align-items:center;gap:4px;transition:all .15s;white-space:nowrap;}
.sk-btn:hover{background:rgba(255,255,255,.2);}
.sk-btn.active{background:var(--brown2);color:#fff;}
.sk-btn.danger{background:rgba(192,57,43,.2);color:#ff8a80;}
.sk-btn.danger:hover{background:rgba(192,57,43,.4);}
.sk-sep{width:1px;height:22px;background:rgba(255,255,255,.15);flex-shrink:0;}
.sk-color{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border .15s;}
.sk-color.sel{border-color:#fff;}
.sk-size-wrap{display:flex;align-items:center;gap:5px;}
.sk-size-lbl{color:rgba(255,255,255,.5);font-size:10px;font-weight:600;}
.sk-size{-webkit-appearance:none;width:55px;height:4px;background:rgba(255,255,255,.2);border-radius:2px;outline:none;cursor:pointer;}
.sk-size::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#fff;cursor:pointer;}
.sketch-hint{background:#faf5ec;padding:6px 14px;font-size:11px;color:var(--brown2);font-weight:600;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px;}
.sketch-canvas-wrap{flex:1;overflow:hidden;position:relative;background:#fff;cursor:crosshair;min-height:280px;}
#sketchCanvas{display:block;touch-action:none;}
.sketch-footer{padding:10px 14px;background:var(--warm);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.sketch-dims-lbl{font-size:12px;color:var(--muted);font-weight:600;}
.sketch-footer-btns{display:flex;gap:8px;}
.sfbtn{border:1.5px solid var(--border);border-radius:8px;padding:7px 16px;cursor:pointer;font-family:'Oswald',sans-serif;font-size:13px;font-weight:600;background:transparent;color:var(--muted);transition:all .15s;}
.sfbtn:hover{background:var(--warm2);border-color:var(--brown);color:var(--brown);}
.sfbtn.ok{background:linear-gradient(135deg,var(--brown),var(--brown2));color:#fff;border-color:var(--brown);}
.sfbtn.ok:hover{opacity:.9;}

/* ── PRINT ── */
@media print {
  @page{size:A4 portrait;margin:12mm;}
  body,#root{height:auto!important;overflow:visible!important;background:#fff!important;}
  #hdr,#sidebar,#info-bar,.modal-overlay,#sketchModal,.no-print{display:none!important;}
  #layout{display:block!important;}
  #main{display:block!important;overflow:visible!important;}
  #content{overflow:visible!important;padding:0!important;}
  .edit-grid,.add-card{display:none!important;}
  .prev-wrap{border:none!important;border-radius:0!important;box-shadow:none!important;}
  .prev-hdr{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;border-radius:0!important;}
  .prev-grid{grid-template-columns:repeat(4,1fr)!important;gap:10px!important;padding:14px!important;}
  .pc{box-shadow:none!important;break-inside:avoid;page-break-inside:avoid;}
  .prev-ftr{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important;}
}
</style>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCE5G8Lk3bgocndE1hZSUePvronW1t3SAE",
  authDomain: "brasil-vidros-c7c3a.firebaseapp.com",
  databaseURL: "https://brasil-vidros-c7c3a-default-rtdb.firebaseio.com",
  projectId: "brasil-vidros-c7c3a",
  storageBucket: "brasil-vidros-c7c3a.firebasestorage.app",
  messagingSenderId: "669693663227",
  appId: "1:669693663227:web:22a3bc8110a88c03c35d5e"
};

const fbApp = initializeApp(firebaseConfig);
const db = getDatabase(fbApp);
let __st = null;

// Firebase arrays fix
function __fixArrays(d){
  if(d===null||d===undefined||typeof d!=='object'||Array.isArray(d)) return d;
  const keys=Object.keys(d);
  const isArr=keys.length>0&&keys.every(k=>/^\d+$/.test(k))&&
    keys.map(Number).sort((a,b)=>a-b).every((v,i)=>v===i);
  if(isArr){const a=[];keys.map(Number).sort((a,b)=>a-b).forEach(k=>a.push(__fixArrays(d[k])));return a;}
  const o={};for(const k of keys)o[k]=__fixArrays(d[k]);return o;
}
window.__fixArrays=__fixArrays;

// ── SYNC BADGE ──────────────────────────────────────────────────
function __getOrCreateBadge(){
  let el=document.getElementById('fbSync');
  if(!el){
    el=document.createElement('div');
    el.id='fbSync';
    el.style.cssText='position:fixed;bottom:14px;right:14px;font-size:11px;font-weight:600;'+
      'padding:5px 14px;border-radius:20px;pointer-events:none;z-index:9999;'+
      'transition:all .4s;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;gap:6px;';
    document.body.appendChild(el);
  }
  return el;
}

function __showSync(msg, c, bg, persist){
  const el=__getOrCreateBadge();
  el.innerHTML=msg;
  el.style.color=c||'#00e5a0';
  el.style.background=bg||'rgba(0,0,0,.7)';
  el.style.opacity='1';
  clearTimeout(el.__t);
  if(!persist) el.__t=setTimeout(()=>el.style.opacity='0', 3000);
}

// ── OFFLINE DETECTION ──────────────────────────────────────────
function __updateOnlineStatus(){
  if(!navigator.onLine){
    __showSync('📵 Sem internet — salvando localmente','#f5c842','rgba(120,80,0,.85)', true);
  } else {
    // Back online - hide offline badge
    const el=document.getElementById('fbSync');
    if(el&&el.textContent.includes('Sem internet')) el.style.opacity='0';
  }
}

window.addEventListener('online',  ()=>{
  __showSync('✅ Internet reconectada — sincronizando...','#00e5a0','rgba(0,0,0,.7)', false);
  // Trigger a sync if possible
  setTimeout(()=>{ if(window.__syncToCloud) window.__syncToCloud(); }, 500);
});
window.addEventListener('offline', __updateOnlineStatus);
// Check on load
document.addEventListener('DOMContentLoaded', __updateOnlineStatus);

// ── FIREBASE FUNCTIONS ─────────────────────────────────────────
window.__fbSave=function(key,data){
  if(!navigator.onLine){
    __showSync('📵 Sem internet — salvando localmente','#f5c842','rgba(120,80,0,.85)', true);
    return;
  }
  clearTimeout(__st);
  __showSync('☁ sincronizando...','#f5c842','rgba(0,0,0,.7)', false);
  __st=setTimeout(()=>{
    set(ref(db,key),data)
      .then(()=>__showSync('☁ sincronizado','#00e5a0','rgba(0,0,0,.7)', false))
      .catch(e=>{
        console.warn('FB:',e);
        __showSync('⚠ erro ao sincronizar','#ff4d6d','rgba(80,0,0,.8)', false);
      });
  },600);
};

window.__fbLoad=function(key,cb){
  if(!navigator.onLine){ cb(null); return; }
  get(ref(db,key)).then(s=>cb(s.exists()?__fixArrays(s.val()):null)).catch(()=>cb(null));
};

window.__fbListen=function(key,cb){
  onValue(ref(db,key),s=>{ if(s.exists()) cb(__fixArrays(s.val())); });
};

window.__fbReady=true;
window.dispatchEvent(new Event('fbReady'));
</script>
</head>
<body>
<div id="root">
  <div id="hdr">
    <div class="hdr-logo">
      <div class="hdr-icon">🚪</div>
      <div class="hdr-brand">
        <div class="hdr-title">TERMO DE MEDIÇÃO</div>
        <div class="hdr-sub">Medição de portas e vãos</div>
      </div>
    </div>
    <div class="hdr-right" id="hdr-right"></div>
  </div>
  <div id="layout">
    <div id="sidebar">
      <div class="sb-head">
        <div class="sb-title">Projetos salvos</div>
        <button class="new-btn" onclick="openNewModal()">
          <span style="font-size:18px;line-height:1;">+</span> Novo projeto
        </button>
      </div>
      <div class="sb-list" id="sb-list"></div>
    </div>
    <div id="main">
      <div id="info-bar"></div>
      <div id="content"></div>
    </div>
  </div>
</div>

<!-- SKETCH MODAL -->
<div id="sketchModal">
  <div class="sketch-box">
    <div class="sketch-toolbar">
      <span class="sk-title">✏️ DESENHAR PORTA</span>
      <div class="sk-btn active" id="sk-tool-draw" onclick="setTool('draw')">✏️ Livre</div>
      <div class="sk-btn" id="sk-tool-line" onclick="setTool('line')">📏 Reta</div>
      <div class="sk-btn" id="sk-tool-rect" onclick="setTool('rect')">▭ Ret.</div>
      <div class="sk-btn" id="sk-tool-text" onclick="setTool('text')">T Texto</div>
      <div class="sk-btn" id="sk-tool-move" onclick="setTool('move')">✥ Mover</div>
      <div class="sk-btn" onclick="changeFontSize(-2)">A⁻</div>
      <div class="sk-btn" onclick="changeFontSize(+2)">A⁺</div>
      <div class="sk-btn" onclick="rotateText(-15)">↺</div>
      <div class="sk-btn" onclick="rotateText(+15)">↻</div>
      <div class="sk-btn danger" onclick="deleteSelectedText()" title="Apagar texto selecionado">🗑 Txt</div>
      <div class="sk-btn" id="sk-tool-erase" onclick="setTool('erase')">⬜ Apagar</div>
      <div class="sk-sep"></div>
      <div class="sk-color sel" style="background:#5c3d1e;" onclick="setColor('#5c3d1e',this)"></div>
      <div class="sk-color" style="background:#c0392b;" onclick="setColor('#c0392b',this)"></div>
      <div class="sk-color" style="background:#1565c0;" onclick="setColor('#1565c0',this)"></div>
      <div class="sk-color" style="background:#222;" onclick="setColor('#222',this)"></div>
      <div class="sk-sep"></div>
      <div class="sk-size-wrap">
        <span class="sk-size-lbl">Esp.</span>
        <input type="range" class="sk-size" id="skSize" min="1" max="20" value="3">
      </div>
      <div class="sk-sep"></div>
      <div class="sk-size-wrap">
        <span class="sk-size-lbl">Grade</span>
        <select id="skGridSize" onchange="redrawGrid()" style="background:rgba(255,255,255,.1);border:none;color:#e8ddd0;border-radius:5px;padding:3px 5px;font-size:11px;cursor:pointer;">
          <option value="10">10px</option>
          <option value="20" selected>20px</option>
          <option value="40">40px</option>
          <option value="0">OFF</option>
        </select>
      </div>
      <div class="sk-sep"></div>
      <div class="sk-btn danger" onclick="clearCanvas()">🗑 Limpar</div>
      <div class="sk-btn danger" onclick="undoSketch()">↩ Desfazer</div>
    </div>
    <div class="sketch-hint">
      <span>💡</span><span id="skHintText">Desenhe livremente o esquema da porta, parede e vão.</span>
    </div>
    <div class="sketch-canvas-wrap" id="skCanvasWrap" style="position:relative;">
      <canvas id="sketchCanvas"></canvas>
      <div id="skTextLayer" style="position:absolute;inset:0;pointer-events:none;overflow:hidden;"></div>
    </div>
    <div class="sketch-footer">
      <div class="sketch-dims-lbl" id="skDimsLabel">Porta: — × — mm</div>
      <div class="sketch-footer-btns">
        <button class="sfbtn" onclick="closeSketch()">Cancelar</button>
        <button class="sfbtn ok" onclick="saveSketch()">✓ Salvar desenho</button>
      </div>

</div>

<script>
// ══════════════════════════════════════════════
//  DOOR TYPES
// ══════════════════════════════════════════════
const DOOR_GROUPS = [
  { label: "TIPO DE ABERTURA", types: [
    "Porta de Giro",
    "Porta de Correr",
    "Porta Pivotante",
    "Porta Dupla",
    "Porta de Correr Embutida",
    "Porta Camarão",
    "Porta Vai e Vem",
  ]},
  { label: "SERVIÇOS", types: [
    "Manutenção",
    "Reparo",
    "Ajuste",
    "Troca de Dobradiça",
    "Troca de Fechadura",
    "Rodapé",
    "Outros",
  ]},
];

function buildDoorOptions(sel){
  let h = '<option value="">— Selecione o tipo —</option>';
  DOOR_GROUPS.forEach(g=>{
    h += `<optgroup label="── ${g.label} ──">`;
    g.types.forEach(t=> h+=`<option value="${t}" ${t===sel?'selected':''}>${t}</option>`);
    h += '</optgroup>';
  });
  return h;
}

// door SVG preview
function doorSVG(lp, vl, va, tipo, lado){
  // Technical plan view (top-down) like architectural drawing
  const SW = 90;  // svg width
  const SH = 110; // svg height
  const wallT = lp > 0 ? Math.max(8, Math.min(18, Math.round(lp / 30))) : 10; // wall thickness px
  const doorW = SW - wallT * 2 - 4; // door leaf width
  const isCorrer = tipo && tipo.toLowerCase().includes('correr');
  const isPivot  = tipo && tipo.toLowerCase().includes('pivotante');
  const isDupla  = tipo && tipo.toLowerCase().includes('dupla');
  const isEsq    = lado === 'Esquerdo';

  // In plan view:
  // walls on top and bottom (horizontal cuts)
  // door leaf shown as thin rectangle
  // swing arc as quarter circle

  const wallY1 = 8;            // top wall top
  const wallY2 = wallY1 + wallT; // top wall bottom (= door opening start)
  const openingX1 = wallT + 2; // left jamb
  const openingX2 = SW - wallT - 2; // right jamb
  const openingW = openingX2 - openingX1;
  const leafH = 3;             // door leaf thickness in plan
  const leafY = wallY2;        // door leaf sits at opening
  const arcR  = openingW;      // swing radius = door width

  // hinge corner
  const hx = isEsq ? openingX1 : openingX2;
  // swing end point (quarter arc)
  // Esq: hinge on left (openingX1), arc sweeps RIGHT → end is (openingX1 + arcR, wallY2+arcR) but capped
  // Dir: hinge on right (openingX2), arc sweeps LEFT → end is (openingX2 - arcR, wallY2+arcR)
  const arcEndX = isEsq ? Math.min(openingX1 + arcR, SW-2) : Math.max(openingX2 - arcR, 2);
  const arcEndY = wallY2 + arcR;
  // sweep: Esq hinge left → door opens to RIGHT (clockwise from top) = sweep 0
  //        Dir hinge right → door opens to LEFT (counter-clockwise) = sweep 1  
  const sweep = isEsq ? 0 : 1;

  // Labels
  const larpLabel = vl > 0 ? vl + '' : '—';
  const altLabel  = va > 0 ? va + '' : '—';
  const lpLabel   = lp > 0 ? lp + '' : '—';

  let content = '';

  if (isCorrer) {
    // SLIDING DOOR: plan shows door in wall pocket + track
    const trackY = wallY2 + 6;
    const pocketW = openingW * 0.5;
    content += `
    <!-- wall top -->
    <rect x="0" y="${wallY1}" width="${SW}" height="${wallT}" fill="#d8cfc4" stroke="#5c3d1e" stroke-width="1"/>
    <!-- pocket left -->
    <rect x="${openingX1}" y="${wallY1}" width="${pocketW}" height="${wallT}" fill="#e8e0d5" stroke="#9c6b3c" stroke-width=".8" stroke-dasharray="2,2"/>
    <!-- opening -->
    <rect x="${openingX1+pocketW}" y="${wallY2-1}" width="${openingW-pocketW}" height="2" fill="none" stroke="#5c3d1e" stroke-width=".8"/>
    <!-- track -->
    <line x1="${openingX1}" y1="${trackY}" x2="${openingX2}" y2="${trackY}" stroke="#9c6b3c" stroke-width="1.5"/>
    <!-- door leaf (sliding, partially open) -->
    <rect x="${openingX1+pocketW-2}" y="${wallY1+1}" width="${openingW-pocketW+2}" height="${wallT-2}" fill="#f0e6d3" stroke="#7a5230" stroke-width="1.2"/>
    <!-- wall bottom (floor line) -->
    <line x1="0" y1="${wallY2+14}" x2="${SW}" y2="${wallY2+14}" stroke="#5c3d1e" stroke-width="1.5"/>
    <!-- arrow -->
    <path d="M${openingX1+pocketW+4} ${wallY2+8} L${openingX1+4} ${wallY2+8}" stroke="#c8902a" stroke-width="1.2" fill="none" marker-end="url(#arrow)"/>
    <!-- CORRER label -->
    <text x="${SW/2}" y="${wallY2+26}" text-anchor="middle" font-size="7" font-family="Oswald,sans-serif" fill="#7a5230" font-weight="600">CORRER</text>
    `;
  } else if (isPivot) {
    const pivotX = openingX1 + openingW / 2;
    const pivotY = wallY2;
    const pr = openingW / 2;
    content += `
    <!-- wall top -->
    <rect x="0" y="${wallY1}" width="${SW}" height="${wallT}" fill="#d8cfc4" stroke="#5c3d1e" stroke-width="1"/>
    <!-- opening gap -->
    <!-- left half leaf -->
    <rect x="${openingX1}" y="${wallY2}" width="${openingW/2 - 1}" height="${leafH}" fill="#f0e6d3" stroke="#7a5230" stroke-width="1.2"/>
    <!-- right half leaf -->
    <rect x="${pivotX+1}" y="${wallY2}" width="${openingW/2 - 1}" height="${leafH}" fill="#f0e6d3" stroke="#7a5230" stroke-width="1.2"/>
    <!-- pivot point -->
    <circle cx="${pivotX}" cy="${wallY2+1}" r="2.5" fill="#c8902a" stroke="#7a5230" stroke-width=".8"/>
    <!-- symmetric arc -->
    <path d="M${openingX1} ${wallY2+leafH} A${pr} ${pr} 0 0 1 ${openingX1+openingW} ${wallY2+leafH}" fill="rgba(200,144,42,.07)" stroke="#c8902a" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- floor -->
    <line x1="0" y1="${wallY2+pr+8}" x2="${SW}" y2="${wallY2+pr+8}" stroke="#5c3d1e" stroke-width="1.5"/>
    <!-- PIVOTANTE label -->
    <text x="${SW/2}" y="${wallY2+pr+20}" text-anchor="middle" font-size="7" font-family="Oswald,sans-serif" fill="#7a5230" font-weight="600">PIVOTANTE</text>
    `;
  } else if (isDupla) {
    const half = openingW / 2;
    const hx1 = openingX1; const hx2 = openingX2;
    const arc1end = openingX1 + half; const arc2end = openingX2 - half;
    content += `
    <!-- wall top -->
    <rect x="0" y="${wallY1}" width="${SW}" height="${wallT}" fill="#d8cfc4" stroke="#5c3d1e" stroke-width="1"/>
    <!-- left leaf -->
    <rect x="${openingX1}" y="${wallY2}" width="${half}" height="${leafH}" fill="#f0e6d3" stroke="#7a5230" stroke-width="1.2"/>
    <!-- right leaf -->
    <rect x="${openingX1+half}" y="${wallY2}" width="${half}" height="${leafH}" fill="#f0e6d3" stroke="#7a5230" stroke-width="1.2"/>
    <!-- left arc -->
    <path d="M${openingX1} ${wallY2+leafH} A${half} ${half} 0 0 1 ${arc1end} ${wallY2+leafH+half}" fill="rgba(200,144,42,.06)" stroke="#c8902a" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- right arc -->
    <path d="M${openingX2} ${wallY2+leafH} A${half} ${half} 0 0 0 ${arc2end} ${wallY2+leafH+half}" fill="rgba(200,144,42,.06)" stroke="#c8902a" stroke-width="1" stroke-dasharray="3,2"/>
    <!-- hinge marks -->
    <circle cx="${openingX1}" cy="${wallY2+2}" r="1.5" fill="#9c6b3c"/>
    <circle cx="${openingX2}" cy="${wallY2+2}" r="1.5" fill="#9c6b3c"/>
    <!-- floor -->
    <line x1="0" y1="${wallY2+half+10}" x2="${SW}" y2="${wallY2+half+10}" stroke="#5c3d1e" stroke-width="1.5"/>
    <!-- DUPLA label -->
    <text x="${SW/2}" y="${wallY2+half+22}" text-anchor="middle" font-size="7" font-family="Oswald,sans-serif" fill="#7a5230" font-weight="600">DUPLA</text>
    `;
  } else {
    // Standard swing door plan view
    content += `
    <!-- wall top with hatch fill -->
    <rect x="0" y="${wallY1}" width="${SW}" height="${wallT}" fill="#d8cfc4" stroke="#5c3d1e" stroke-width="1"/>
    <!-- hatch lines on wall -->
    <line x1="4" y1="${wallY1}" x2="${wallT+6}" y2="${wallY2}" stroke="#9c8a7a" stroke-width=".5"/>
    <line x1="10" y1="${wallY1}" x2="${wallT+12}" y2="${wallY2}" stroke="#9c8a7a" stroke-width=".5"/>
    <!-- jamb left -->
    <rect x="${openingX1-wallT}" y="${wallY1}" width="${wallT}" height="${wallT+4}" fill="#d8cfc4" stroke="#5c3d1e" stroke-width="1"/>
    <!-- jamb right -->
    <rect x="${openingX2}" y="${wallY1}" width="${wallT}" height="${wallT+4}" fill="#d8cfc4" stroke="#5c3d1e" stroke-width="1"/>
    <!-- door leaf -->
    <rect x="${openingX1}" y="${wallY2}" width="${openingW}" height="${leafH}" fill="#f0e6d3" stroke="#7a5230" stroke-width="1.5"/>
    <!-- hinge dot -->
    <circle cx="${hx}" cy="${wallY2+leafH/2}" r="2" fill="#9c6b3c" stroke="#5c3d1e" stroke-width=".5"/>
    <!-- swing arc: starts at hinge corner, swings 90 degrees -->
    <path d="M${hx} ${wallY2+leafH} A${arcR} ${arcR} 0 0 ${sweep} ${arcEndX} ${arcEndY}" fill="rgba(200,144,42,.07)" stroke="#c8902a" stroke-width="1.2" stroke-dasharray="4,2.5"/>
    <!-- arc end tick -->
    <line x1="${arcEndX-3}" y1="${arcEndY}" x2="${arcEndX+3}" y2="${arcEndY}" stroke="#c8902a" stroke-width="1.2"/>
    <!-- door leaf open position (dashed line from hinge to arc end) -->
    <line x1="${hx}" y1="${wallY2+leafH}" x2="${hx}" y2="${arcEndY}" stroke="#c8902a" stroke-width="1" stroke-dasharray="3,2" opacity=".5"/>
    <!-- floor line -->
    <line x1="0" y1="${arcEndY+6}" x2="${SW}" y2="${arcEndY+6}" stroke="#5c3d1e" stroke-width="1.5"/>
    <!-- dimension: opening width -->
    <line x1="${openingX1}" y1="${arcEndY+1}" x2="${openingX1}" y2="${arcEndY+5}" stroke="#5c3d1e" stroke-width=".8"/>
    <line x1="${openingX2}" y1="${arcEndY+1}" x2="${openingX2}" y2="${arcEndY+5}" stroke="#5c3d1e" stroke-width=".8"/>
    <line x1="${openingX1}" y1="${arcEndY+3}" x2="${openingX2}" y2="${arcEndY+3}" stroke="#5c3d1e" stroke-width=".8"/>
    <text x="${SW/2}" y="${arcEndY+14}" text-anchor="middle" font-size="7.5" font-family="Oswald,sans-serif" fill="#5c3d1e" font-weight="700">${larpLabel}</text>
    <!-- lado label -->
    ${lado?`<text x="${isEsq ? openingX1+4 : openingX2-4}" y="${wallY2+leafH+12}" text-anchor="${isEsq ? 'start':'end'}" font-size="7" font-family="Oswald,sans-serif" fill="#c8902a" font-weight="600">${isEsq?'⬅ ESQ':'DIR ➡'}</text>`:''}
    `;
  }

  return `<svg width="${SW}" height="${SH}" viewBox="0 0 ${SW} ${SH}" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" markerWidth="6" markerHeight="6" refX="3" refY="3" orient="auto">
        <path d="M0,0 L6,3 L0,6 Z" fill="#c8902a"/>
      </marker>
    </defs>
    ${content}
    <!-- NORTH indicator / scale label -->
    <text x="${SW-2}" y="7" text-anchor="end" font-size="6" font-family="Oswald,sans-serif" fill="#9c6b3c" opacity=".7">PLANTA</text>
  </svg>`;
}

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const STORE='brasil_portas_v1', LAST='brasil_portas_last_v1';
let projects=[], activeId=null, tab='edit', gid=100, saveTimer=null, modal=null;

function loadData(){
  try{const d=localStorage.getItem(STORE);if(d)projects=JSON.parse(d);}catch(e){}
  try{const l=localStorage.getItem(LAST);if(l)activeId=l;}catch(e){}
  if(!activeId||!projects.find(p=>p.id===activeId)) activeId=projects[0]?.id||null;
}
function persist(){
  try{localStorage.setItem(STORE,JSON.stringify(projects));localStorage.setItem(LAST,activeId||'');}catch(e){}
}
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{persist();flashSaved();},500);}
function flashSaved(){
  const el=document.getElementById('auto-badge');if(!el)return;
  el.textContent='✓ salvo';el.style.background='#d4edda';el.style.color='#155724';
  setTimeout(()=>{if(el){el.textContent='auto-save';el.style.background='var(--warm2)';el.style.color='var(--brown)';}},1800);
}
function newProject(client,obra){
  return{id:'p'+Date.now()+Math.random().toString(36).slice(2),client:client||'',obra:obra||'',doors:[],createdAt:Date.now()};
}
function active(){return projects.find(p=>p.id===activeId)||null;}
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ══════════════════════════════════════════════
//  RENDER
// ══════════════════════════════════════════════
function renderAll(){renderHdr();renderSB();renderInfoBar();renderContent();}

function renderHdr(){
  const p=active();
  document.getElementById('hdr-right').innerHTML=`
    <button class="tab-btn ${tab==='edit'?'on':'off'}" onclick="setTab('edit')">✏️ Editar</button>
    <button class="tab-btn ${tab==='preview'?'on':'off'}" onclick="setTab('preview')">👁️ Visualizar</button>
    ${tab==='preview'&&p?`<button class="print-btn no-print" onclick="window.print()">🖨️ Imprimir / PDF</button>`:''}
  `;
}

function renderSB(){
  const el=document.getElementById('sb-list');
  if(!projects.length){el.innerHTML='<div class="sb-empty">Nenhum projeto ainda.<br>Crie o primeiro acima.</div>';return;}
  el.innerHTML=projects.map(p=>`
    <div class="proj-item ${p.id===activeId?'active':''}" onclick="selectProj('${p.id}')">
      <div class="proj-name">${esc(p.client)||'Sem nome'}</div>
      <div class="proj-sub">${esc(p.obra)||'Sem local'} · ${(p.doors||[]).length} porta(s)</div>
      <button class="proj-del" onclick="delProj(event,'${p.id}')" title="Excluir">✕</button>
    </div>`).join('');
}

function renderInfoBar(){
  const p=active(), el=document.getElementById('info-bar');
  if(!p){el.innerHTML='';return;}
  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;"><span class="lbl">Cliente</span>
      <input class="fi" style="width:175px;" value="${esc(p.client)}" oninput="updField('client',this.value)" placeholder="Nome do cliente">
    </div>
    <div class="idiv"></div>
    <div style="display:flex;align-items:center;gap:8px;"><span class="lbl">Local / Obra</span>
      <input class="fi" style="width:220px;" value="${esc(p.obra)}" oninput="updField('obra',this.value)" placeholder="Endereço ou nome da obra">
    </div>
    <div style="margin-left:auto;display:flex;gap:14px;align-items:center;">
      <span class="auto-badge" id="auto-badge">auto-save</span>
      <div><div class="stat-lbl">Portas</div><div class="stat-val">${(p.doors||[]).length}</div></div>
    </div>`;
}

function renderContent(){
  const p=active(), el=document.getElementById('content');
  if(!p){
    el.innerHTML=`<div class="empty">
      <span style="font-size:48px;opacity:.2;">🚪</span>
      <div style="font-size:15px;font-weight:700;font-family:'Oswald',sans-serif;color:var(--muted);letter-spacing:.5px;">SELECIONE OU CRIE UM PROJETO</div>
      <div style="font-size:12px;color:var(--muted);">Use a barra lateral para navegar</div>
    </div>`;return;
  }
  el.innerHTML = tab==='edit' ? buildEdit(p) : buildPreview(p);
}

function buildEdit(p){
  return `<div class="edit-grid">
    ${(p.doors||[]).map((d,i)=>`
      <div class="gc${d.sketch?' has-sketch':''}">
        <div class="gc-top">
          <div class="door-badge">${i+1}</div>
          <div class="gc-type-tag">${esc(d.tipo)||'— tipo —'}</div>
          <button class="gc-rm" onclick="rmDoor('${p.id}',${d.id})">✕</button>
        </div>

        <!-- preview -->
        <div class="gc-preview">
          ${d.sketch
            ? `<img class="sketch-thumb" src="${d.sketch}" style="max-height:140px;object-fit:contain;" alt="Esboço">`
            : doorSVG(d.lp,d.vl,d.va,d.tipo,d.lado)
          }
        </div>

        <!-- 3 medidas -->
        ${!d.sketch?`<div class="gc-dims-3">
          <label>
            <span class="gc-lbl">Esp. Parede</span>
            <input class="gc-inp" type="number" value="${d.lp}" placeholder="cm" oninput="updDoor('${p.id}',${d.id},'lp',+this.value)">
          </label>
          <label>
            <span class="gc-lbl">Larg. Vão</span>
            <input class="gc-inp" type="number" value="${d.vl}" placeholder="cm" oninput="updDoor('${p.id}',${d.id},'vl',+this.value)">
          </label>
          <label>
            <span class="gc-lbl">Alt. Vão</span>
            <input class="gc-inp" type="number" value="${d.va}" placeholder="cm" oninput="updDoor('${p.id}',${d.id},'va',+this.value)">
          </label>
        </div>`:''}

        <!-- lado abertura -->
        <label>
          <span class="gc-lbl">Lado de Abertura</span>
          <select class="gc-inp" style="cursor:pointer;" onchange="updDoor('${p.id}',${d.id},'lado',this.value)">
            <option value="" ${d.lado===''?'selected':''}>— Selecione o lado —</option>
            <option value="Direito" ${d.lado==='Direito'?'selected':''}>🚪 Direito</option>
            <option value="Esquerdo" ${d.lado==='Esquerdo'?'selected':''}>🚪 Esquerdo</option>
          </select>
        </label>
        ${d.lado?`<div class="gc-tag" style="background:${d.lado==='Direito'?'#e8f5e9':'#e3f2fd'};border:1px solid ${d.lado==='Direito'?'#a5d6a7':'#90caf9'};color:${d.lado==='Direito'?'#2e7d32':'#1565c0'};"><span>${d.lado==='Direito'?'→':'←'}</span>Abertura ${d.lado}</div>`:''}

        <!-- tipo -->
        <label>
          <span class="gc-lbl">Tipo / Serviço</span>
          <select class="gc-inp" style="cursor:pointer;" onchange="updDoor('${p.id}',${d.id},'tipo',this.value)">
            ${buildDoorOptions(d.tipo)}
          </select>
        </label>
        ${d.tipo?`<div class="gc-tag gc-type-badge"><span>🚪</span>${esc(d.tipo)}</div>`:''}

        <!-- calculadora folha -->
        ${d.tipo==='Porta de Giro' ? `
        <div style="background:#f1f8e9;border:1.5px solid #a5d6a7;border-radius:10px;padding:10px 12px;margin:4px 0;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
            <span style="font-size:11px;font-weight:700;color:#2e7d32;letter-spacing:.5px;">📐 MEDIDA DA FOLHA</span>
            ${(d.fl!=null||d.fa!=null)?`<button onclick="resetFolha('${p.id}',${d.id})" style="font-size:9px;background:#fff;border:1px solid #a5d6a7;border-radius:5px;padding:2px 7px;color:#66bb6a;cursor:pointer;">↺ Auto</button>`:''}
          </div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
            <label style="display:flex;flex-direction:column;gap:3px;">
              <span style="font-size:9px;color:#66bb6a;font-weight:700;text-transform:uppercase;">Largura (cm)</span>
              <input type="number" class="gc-inp" 
                value="${d.fl!=null ? d.fl : (d.vl ? d.vl-6 : '')}" 
                placeholder="${d.vl ? d.vl-6 : '—'}"
                oninput="updDoor('${p.id}',${d.id},'fl',+this.value||null)"
                style="font-size:18px;font-weight:800;color:#2e7d32;text-align:center;padding:6px;">

// ══════════════════════════════════════════════
//  SKETCH ENGINE
// ══════════════════════════════════════════════
let skPid=null,skDid=null,skVL=0,skVA=0;
let skTool='draw',skColor='#5c3d1e',skSize=3;
let skDrawing=false,skStartX=0,skStartY=0,skSnapshot=null;
let skHistory=[];   // stores drawing layers only (no grid)
let skTexts=[],skDragTxt=null,skDragOx=0,skDragOy=0,skSelectedTxt=null;
let skTxtCnt=0;

const skModal=document.getElementById('sketchModal');
const skCanvas=document.getElementById('sketchCanvas');
const skCtx=skCanvas.getContext('2d');
const skTextLayer=document.getElementById('skTextLayer');

// ── GRID on a separate canvas ──────────────────────────────────────
let skGridCanvas=null;

function ensureGridCanvas(){
  if(skGridCanvas)return;
  skGridCanvas=document.createElement('canvas');
  skGridCanvas.style.cssText='position:absolute;inset:0;pointer-events:none;';
  document.getElementById('skCanvasWrap').appendChild(skGridCanvas);
}

function drawGrid(){
  ensureGridCanvas();
  skGridCanvas.width=skCanvas.width;
  skGridCanvas.height=skCanvas.height;
  skGridCanvas.style.width=skCanvas.style.width;
  skGridCanvas.style.height=skCanvas.style.height;
  const gc=skGridCanvas.getContext('2d');
  const step=getGridStep();
  gc.clearRect(0,0,skGridCanvas.width,skGridCanvas.height);
  if(!step)return;
  gc.strokeStyle='rgba(150,120,80,.18)';gc.lineWidth=.6;
  for(let x=0;x<=skGridCanvas.width;x+=step){gc.beginPath();gc.moveTo(x,0);gc.lineTo(x,skGridCanvas.height);gc.stroke();}
  for(let y=0;y<=skGridCanvas.height;y+=step){gc.beginPath();gc.moveTo(0,y);gc.lineTo(skGridCanvas.width,y);gc.stroke();}
  const major=step*5;
  gc.strokeStyle='rgba(120,90,50,.35)';gc.lineWidth=1;
  for(let x=0;x<=skGridCanvas.width;x+=major){gc.beginPath();gc.moveTo(x,0);gc.lineTo(x,skGridCanvas.height);gc.stroke();}
  for(let y=0;y<=skGridCanvas.height;y+=major){gc.beginPath();gc.moveTo(0,y);gc.lineTo(skGridCanvas.width,y);gc.stroke();}
  gc.fillStyle='rgba(120,90,50,.45)';gc.font='9px sans-serif';gc.textAlign='left';
  for(let x=major;x<skGridCanvas.width;x+=major)gc.fillText(x+'',x+2,10);
  for(let y=major;y<skGridCanvas.height;y+=major)gc.fillText(y+'',2,y-2);
}

function redrawGrid(){drawGrid();}
function getGridStep(){const s=document.getElementById('skGridSize');return s?parseInt(s.value)||0:20;}

// ── HISTORY (drawing only, no grid) ───────────────────────────────
function pushHist(){
  skHistory.push(skCtx.getImageData(0,0,skCanvas.width,skCanvas.height));
  if(skHistory.length>60)skHistory.shift();
  updateUndoBtn();
}

function updateUndoBtn(){
  const btn=document.getElementById('sk-undo-btn');
  if(btn)btn.style.opacity=skHistory.length>1?'1':'.35';
}

function undoSketch(){
  if(skHistory.length<=1)return;
  skHistory.pop();
  skCtx.putImageData(skHistory[skHistory.length-1],0,0);
  updateUndoBtn();
}

// ── OPEN / CLOSE ───────────────────────────────────────────────────
function openSketch(pid,did,vl,va){
  skPid=pid;skDid=did;skVL=vl;skVA=va;
  skTexts=[];skTextLayer.innerHTML='';skHistory=[];skSelectedTxt=null;
  const wrap=document.getElementById('skCanvasWrap');
  const cw=Math.max(wrap.clientWidth||640,400);
  const ch=Math.max(280,Math.min(500,Math.round(cw*(va/Math.max(vl,1))*.5)));
  skCanvas.width=cw;skCanvas.height=ch;
  skTextLayer.style.width=cw+'px';skTextLayer.style.height=ch+'px';
  // white background
  skCtx.fillStyle='#fff';skCtx.fillRect(0,0,cw,ch);
  drawGrid();
  const p=projects.find(x=>x.id===pid);
  const d=p?.doors.find(x=>x.id===did);
  if(d?.sketch){
    const img=new Image();
    img.onload=()=>{
      skCtx.clearRect(0,0,cw,ch);
      skCtx.fillStyle='#fff';skCtx.fillRect(0,0,cw,ch);
      skCtx.drawImage(img,0,0,cw,ch);
      skHistory=[];pushHist();
    };
    img.src=d.sketch;
  } else {pushHist();}
  document.getElementById('skDimsLabel').textContent='Vão: '+vl+' × '+va+' cm';
  skModal.classList.add('open');
  setTool('draw');
  updateUndoBtn();
}

function closeSketch(){
  skModal.classList.remove('open');
  skHistory=[];skTexts=[];skTextLayer.innerHTML='';
}

function saveSketch(){
  const scale=2;
  const exp=document.createElement('canvas');
  exp.width=skCanvas.width*scale;exp.height=skCanvas.height*scale;
  const ec=exp.getContext('2d');
  ec.scale(scale,scale);
  ec.fillStyle='#fff';ec.fillRect(0,0,skCanvas.width,skCanvas.height);
  ec.drawImage(skCanvas,0,0);
  // render texts
  skTexts.forEach(t=>{
    const el=document.getElementById(t.id);if(!el)return;
    const wr=skTextLayer.getBoundingClientRect();
    const er=el.getBoundingClientRect();
    const cx=(er.left-wr.left)+er.width/2,cy=(er.top-wr.top)+er.height/2;
    const ang=(t.angle||0)*Math.PI/180;
    const lines=(el.innerText||t.text).split('\n');
    ec.save();ec.translate(cx,cy);ec.rotate(ang);
    ec.font=`bold ${t.fontSize}px Oswald,sans-serif`;
    ec.fillStyle=t.color;ec.textBaseline='top';
    const lh=t.fontSize+4,th=lines.length*lh;
    lines.forEach((ln,i)=>ec.fillText(ln,-er.width/2+4,-th/2+i*lh));
    ec.restore();
  });
  const url=exp.toDataURL('image/png');
  const p=projects.find(x=>x.id===skPid);
  if(p)p.doors=p.doors.map(d=>d.id===skDid?{...d,sketch:url}:d);
  persist();renderAll();closeSketch();
}

function clearCanvas(){
  skCtx.fillStyle='#fff';skCtx.fillRect(0,0,skCanvas.width,skCanvas.height);
  skTexts=[];skTextLayer.innerHTML='';
  skHistory=[];pushHist();
}

// ── TOOLS ─────────────────────────────────────────────────────────
function setTool(t){
  skTool=t;
  ['draw','line','rect','text','move','erase'].forEach(x=>{
    const el=document.getElementById('sk-tool-'+x);
    if(el)el.classList.toggle('active',x===t);
  });
  const hints={
    draw:'✏️ Desenhe livremente — clique e arraste',
    line:'📏 Clique e arraste para traçar uma reta',
    rect:'▭ Clique e arraste para desenhar um retângulo',
    text:'T Clique na tela para adicionar uma caixa de texto',
    move:'✥ Clique numa caixa de texto para selecioná-la e arraste para mover. Use A⁺/A⁻ para tamanho e ↺↻ para girar.',
    erase:'⬜ Apaga o que você desenhar — não afeta a grade nem os textos',
  };
  document.getElementById('skHintText').textContent=hints[t]||'';
  skCanvas.style.cursor=t==='erase'?'cell':t==='move'?'default':'crosshair';
  skTextLayer.style.pointerEvents=t==='move'?'auto':'none';
}

function setColor(c,el){
  skColor=c;
  document.querySelectorAll('.sk-color').forEach(x=>x.classList.remove('sel'));
  el.classList.add('sel');
}

// ── TEXT BOXES ────────────────────────────────────────────────────
function selectTxt(id){
  document.querySelectorAll('.sk-txt-box').forEach(d=>{
    d.style.outline='none';
    d.style.boxShadow='0 1px 4px rgba(0,0,0,.15)';
  });
  skSelectedTxt=id;
  if(!id)return;
  const div=document.getElementById(id);
  if(div){div.style.outline='2px solid #c8902a';div.style.boxShadow='0 0 0 3px rgba(200,144,42,.3)';}
}

function changeFontSize(d){
  if(!skSelectedTxt)return;
  const t=skTexts.find(t=>t.id===skSelectedTxt);if(!t)return;
  t.fontSize=Math.max(8,Math.min(120,t.fontSize+d));
  const div=document.getElementById(t.id);
  if(div){div.style.fontSize=t.fontSize+'px';div.style.minHeight=(t.fontSize+14)+'px';}
}

function rotateText(d){
  if(!skSelectedTxt)return;
  const t=skTexts.find(t=>t.id===skSelectedTxt);if(!t)return;
  t.angle=(t.angle||0)+d;
  const div=document.getElementById(t.id);
  if(div)div.style.transform=`rotate(${t.angle}deg)`;
}

function deleteSelectedText(){
  if(!skSelectedTxt)return;
  const div=document.getElementById(skSelectedTxt);
  if(div)div.remove();
  skTexts=skTexts.filter(t=>t.id!==skSelectedTxt);
  skSelectedTxt=null;
}

function addTextBox(x,y){
  const id='txt'+(++skTxtCnt);const fs=20;const color=skColor;
  const div=document.createElement('div');
  div.id=id;div.className='sk-txt-box';
  div.contentEditable='true';div.spellcheck=false;
  div.style.cssText=`position:absolute;left:${x}px;top:${y}px;min-width:70px;min-height:${fs+14}px;
    font-family:'Oswald',sans-serif;font-weight:700;font-size:${fs}px;line-height:1.3;color:${color};
    background:rgba(255,255,255,.92);outline:2px solid #c8902a;border-radius:5px;
    padding:3px 7px;cursor:text;white-space:pre-wrap;word-break:break-word;max-width:300px;
    box-shadow:0 0 0 3px rgba(200,144,42,.3);pointer-events:auto;user-select:text;
    transform:rotate(0deg);transform-origin:center;touch-action:none;`;
  div.setAttribute('data-skid',id);div.setAttribute('data-color',color);

  // DRAG via pointer events for smooth mobile+desktop
  let dragging=false,dragOx=0,dragOy=0;

  div.addEventListener('pointerdown',e=>{
    selectTxt(id);
    if(skTool!=='move')return;
    e.preventDefault();e.stopPropagation();
    dragging=true;
    div.setPointerCapture(e.pointerId);
    const wr=skTextLayer.getBoundingClientRect();
    const r=div.getBoundingClientRect();
    dragOx=e.clientX-(r.left-wr.left);
    dragOy=e.clientY-(r.top-wr.top);
    div.style.cursor='grabbing';
  });

  div.addEventListener('pointermove',e=>{
    if(!dragging)return;
    e.preventDefault();
    const wr=skTextLayer.getBoundingClientRect();
    const nx=Math.max(0,e.clientX-wr.left-dragOx);
    const ny=Math.max(0,e.clientY-wr.top-dragOy);
    div.style.left=nx+'px';div.style.top=ny+'px';
    const t=skTexts.find(t=>t.id===id);
    if(t){t.x=nx;t.y=ny;}
  });

  div.addEventListener('pointerup',e=>{
    if(!dragging)return;
    dragging=false;
    div.style.cursor='text';
  });

  div.addEventListener('focus',()=>selectTxt(id));
  div.addEventListener('click',e=>{e.stopPropagation();selectTxt(id);});
  div.addEventListener('input',()=>{const t=skTexts.find(t=>t.id===id);if(t)t.text=div.innerText;});

  skTextLayer.appendChild(div);
  skTexts.push({id,x,y,text:'',color,fontSize:fs,angle:0});
  skSelectedTxt=id;
  setTimeout(()=>div.focus(),30);
  return div;
}

// ── DRAWING ──────────────────────────────────────────────────────
function getPos(e){
  const r=skCanvas.getBoundingClientRect();
  const s=e.touches?e.touches[0]:e;
  return{x:s.clientX-r.left,y:s.clientY-r.top};
}

function skDown(e){
  selectTxt(null);
  if(skTool==='text'){e.preventDefault();const{x,y}=getPos(e);addTextBox(x,y);return;}
  e.preventDefault();
  skDrawing=true;
  const{x,y}=getPos(e);
  skStartX=x;skStartY=y;
  if(skTool==='draw'||skTool==='erase'){
    skCtx.beginPath();skCtx.moveTo(x,y);
  } else {
    skSnapshot=skCtx.getImageData(0,0,skCanvas.width,skCanvas.height);
  }
}

function skMove(e){
  if(!skDrawing)return;
  e.preventDefault();
  const{x,y}=getPos(e);
  const sz=parseInt(document.getElementById('skSize').value)||3;
  if(skTool==='draw'){
    skCtx.strokeStyle=skColor;skCtx.lineWidth=sz;
    skCtx.lineCap='round';skCtx.lineJoin='round';
    skCtx.lineTo(x,y);skCtx.stroke();
  } else if(skTool==='erase'){
    // Erase only drawing, not grid — grid is on separate canvas
    skCtx.strokeStyle='#fff';skCtx.lineWidth=sz*6;
    skCtx.lineCap='round';skCtx.lineTo(x,y);skCtx.stroke();
  } else {
    skCtx.putImageData(skSnapshot,0,0);
    skCtx.strokeStyle=skColor;skCtx.lineWidth=sz;skCtx.lineCap='round';
    skCtx.beginPath();
    if(skTool==='line'){skCtx.moveTo(skStartX,skStartY);skCtx.lineTo(x,y);skCtx.stroke();}
    else if(skTool==='rect')skCtx.strokeRect(skStartX,skStartY,x-skStartX,y-skStartY);
  }
}

function skUp(){
  if(!skDrawing)return;
  skDrawing=false;
  skCtx.beginPath();
  pushHist();
}

skCanvas.addEventListener('mousedown',skDown);
skCanvas.addEventListener('mousemove',skMove);
skCanvas.addEventListener('mouseup',skUp);
skCanvas.addEventListener('mouseleave',skUp);
skCanvas.addEventListener('touchstart',skDown,{passive:false});
skCanvas.addEventListener('touchmove',skMove,{passive:false});
skCanvas.addEventListener('touchend',skUp);

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
loadData();
renderAll();

// ── FIREBASE SYNC ──────────────────────────────────────────────
(function(){
  const FB_KEY = 'brasil_portas';

  // Push current localStorage data to Firebase
  window.__syncToCloud = function(){
    if(!navigator.onLine || !window.__fbSave) return;
    try{
      const raw = localStorage.getItem('brasil_portas_v1');
      if(raw) window.__fbSave(FB_KEY, JSON.parse(raw));
    }catch(e){}
  };

  // Patch ALL save functions to sync to cloud
  function _patchSaves(){
    // scheduleSave (Agenda apps)
    if(typeof scheduleSave==='function'){
      const _orig = scheduleSave;
      window.scheduleSave = function(){
        _orig();
        // sync after the save timer fires (~700ms)
        setTimeout(window.__syncToCloud, 900);
      };
    }
    // persist (VidrosEditor, BrasilPortas)
    if(typeof persist==='function'){
      const _orig = persist;
      window.persist = function(){
        _orig();
        window.__syncToCloud();
      };
    }
    // save (GestaoObras, Cronograma)
    if(typeof save==='function' && save.toString().includes('localStorage')){
      const _orig = save;
      window.save = function(){
        _orig();
        window.__syncToCloud();
      };
    }
    // saveAll
    if(typeof saveAll==='function'){
      const _orig = saveAll;
      window.saveAll = function(d){
        if(d!==undefined) _orig(d); else _orig();
        window.__syncToCloud();
      };
    }
  }

  // Load from Firebase on start
  function _fbInit(){
    if(!window.__fbLoad){ setTimeout(_fbInit, 200); return; }

    // Patch saves after DOM ready
    if(document.readyState==='loading')
      document.addEventListener('DOMContentLoaded', _patchSaves);
    else _patchSaves();

    window.__fbLoad('brasil_portas', function(data){
      if(!data) return;
      try{
        const local = localStorage.getItem('brasil_portas_v1');
        const localParsed = local ? JSON.parse(local) : null;
        const isEmpty = !localParsed ||
          (Array.isArray(localParsed) && !localParsed.length) ||
          (typeof localParsed==='object' && !Array.isArray(localParsed) && !Object.keys(localParsed).length);
        if(isEmpty){
          const fixed = window.__fixArrays ? window.__fixArrays(data) : data;
          localStorage.setItem('brasil_portas_v1', JSON.stringify(fixed));
          if(typeof loadData==='function') loadData();
          else if(typeof load==='function') load();
          if(typeof renderAll==='function') renderAll();
        }
      }catch(e){ console.warn('fbLoad error:',e); }
    });

    // Listen for changes from other devices (3s delay to avoid conflicts on load)
    let _ready = false;
    setTimeout(()=>_ready=true, 3000);
    window.__fbListen('brasil_portas', function(data){
      if(!_ready || !data) return;
      try{
        const fixed = window.__fixArrays ? window.__fixArrays(data) : data;
        const incoming = JSON.stringify(fixed);
        const current = localStorage.getItem('brasil_portas_v1');
        if(incoming !== current){
          localStorage.setItem('brasil_portas_v1', JSON.stringify(fixed));
          if(typeof loadData==='function') loadData();
          else if(typeof load==='function') load();
          if(typeof renderAll==='function') renderAll();
        }
      }catch(e){}
    });
  }

  if(window.__fbReady) _fbInit();
  else window.addEventListener('fbReady', _fbInit, {once:true});
})();
</script>
